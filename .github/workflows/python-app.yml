# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x86_64, arm64, x64, x86]

    steps:
    - name: 仓库检出
      uses: actions/checkout@v4
    - name: 设置 Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -U pyinstaller
    - name: 编译
      run: |
        pyinstaller -F -w -i images\logo.ico main.py
    - name: 添加插件
      run: move plugins dist\main\plugins
    - name: 打包
      run: tar -cf dist\Ghost-Downloader-${{ matrix.os }}-${{ matrix.arch }}-PyInstaller.zip dist\main
    - name: 上传文件
      uses: actions/upload-artifact@v3
      with:
        name: Ghost-Downloader-${{ matrix.os }}-${{ matrix.arch }}-PyInstaller.zip
        path: |
          dist\Ghost-Downloader-${{ matrix.os }}-${{ matrix.arch }}-PyInstaller.zip
